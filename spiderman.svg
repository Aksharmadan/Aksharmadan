<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" width="800" height="200">
  <defs>
    <style>
      .spidey { animation: swing 3s ease-in-out infinite; transform-origin: 400px 0px; }
      .web-line { animation: webDraw 3s ease-in-out infinite; }
      .web2 { animation: webDraw2 3s ease-in-out infinite; }
      .city { animation: cityScroll 8s linear infinite; }
      .city2 { animation: cityScroll2 8s linear infinite; }
      .star { animation: twinkle 2s ease-in-out infinite alternate; }
      .glow { animation: glowPulse 2s ease-in-out infinite alternate; }

      @keyframes swing {
        0%   { transform: rotate(-25deg) translateX(-80px); }
        50%  { transform: rotate(25deg) translateX(80px); }
        100% { transform: rotate(-25deg) translateX(-80px); }
      }
      @keyframes webDraw {
        0%   { stroke-dashoffset: 300; opacity: 0.3; }
        25%  { stroke-dashoffset: 0; opacity: 1; }
        75%  { stroke-dashoffset: 0; opacity: 1; }
        100% { stroke-dashoffset: 300; opacity: 0.3; }
      }
      @keyframes webDraw2 {
        0%   { stroke-dashoffset: 0; opacity: 1; }
        25%  { stroke-dashoffset: 300; opacity: 0.3; }
        75%  { stroke-dashoffset: 300; opacity: 0.3; }
        100% { stroke-dashoffset: 0; opacity: 1; }
      }
      @keyframes cityScroll {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-800px); }
      }
      @keyframes cityScroll2 {
        0%   { transform: translateX(800px); }
        100% { transform: translateX(0); }
      }
      @keyframes twinkle {
        from { opacity: 0.2; r: 1; }
        to   { opacity: 1; r: 2; }
      }
      @keyframes glowPulse {
        from { filter: drop-shadow(0 0 4px #E01B24); }
        to   { filter: drop-shadow(0 0 16px #E01B24) drop-shadow(0 0 32px #ff6b35); }
      }
    </style>

    <!-- Web gradient -->
    <linearGradient id="webGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#cccccc;stop-opacity:0.3"/>
    </linearGradient>

    <!-- Sky gradient -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="60%" style="stop-color:#0a0010"/>
      <stop offset="100%" style="stop-color:#1a0005"/>
    </linearGradient>

    <!-- Spidey body gradient -->
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#ff2020"/>
      <stop offset="100%" style="stop-color:#8b0000"/>
    </radialGradient>

    <!-- Building gradient -->
    <linearGradient id="buildGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#skyGrad)"/>

  <!-- Stars -->
  <circle class="star" cx="50" cy="20" r="1.5" fill="white" style="animation-delay:0s"/>
  <circle class="star" cx="150" cy="10" r="1" fill="white" style="animation-delay:0.5s"/>
  <circle class="star" cx="280" cy="25" r="1.5" fill="white" style="animation-delay:1s"/>
  <circle class="star" cx="420" cy="8" r="1" fill="white" style="animation-delay:0.3s"/>
  <circle class="star" cx="560" cy="18" r="1.5" fill="white" style="animation-delay:0.8s"/>
  <circle class="star" cx="680" cy="12" r="1" fill="white" style="animation-delay:1.2s"/>
  <circle class="star" cx="730" cy="30" r="1.5" fill="white" style="animation-delay:0.6s"/>

  <!-- Moon glow -->
  <circle cx="720" cy="30" r="18" fill="#fffbe6" opacity="0.15"/>
  <circle cx="720" cy="30" r="12" fill="#fffbe6" opacity="0.4"/>
  <circle cx="720" cy="30" r="8" fill="white" opacity="0.9"/>

  <!-- CITY BUILDINGS - Layer 1 (scrolling) -->
  <g class="city" opacity="0.7">
    <!-- Buildings set 1 -->
    <rect x="0"   y="90"  width="40" height="110" fill="url(#buildGrad)"/>
    <rect x="5"   y="95"  width="5"  height="4"   fill="#FFD700" opacity="0.6"/>
    <rect x="15"  y="95"  width="5"  height="4"   fill="#FFD700" opacity="0.3"/>
    <rect x="5"   y="108" width="5"  height="4"   fill="#FFD700" opacity="0.8"/>

    <rect x="45"  y="70"  width="55" height="130" fill="url(#buildGrad)"/>
    <rect x="50"  y="75"  width="6"  height="5"   fill="#4FC3F7" opacity="0.5"/>
    <rect x="60"  y="75"  width="6"  height="5"   fill="#4FC3F7" opacity="0.7"/>
    <rect x="70"  y="75"  width="6"  height="5"   fill="#4FC3F7" opacity="0.4"/>
    <rect x="50"  y="88"  width="6"  height="5"   fill="#FFD700" opacity="0.6"/>
    <rect x="70"  y="88"  width="6"  height="5"   fill="#FFD700" opacity="0.3"/>
    <!-- Antenna -->
    <rect x="70"  y="55"  width="3"  height="18"  fill="#333"/>
    <circle cx="71" cy="54" r="3" fill="#E01B24" opacity="0.9"/>

    <rect x="105" y="110" width="35" height="90"  fill="url(#buildGrad)"/>
    <rect x="110" y="115" width="5"  height="4"   fill="#FFD700" opacity="0.5"/>
    <rect x="120" y="115" width="5"  height="4"   fill="#4FC3F7" opacity="0.6"/>

    <rect x="145" y="80"  width="60" height="120" fill="#111122"/>
    <rect x="150" y="85"  width="7"  height="6"   fill="#FFD700" opacity="0.8"/>
    <rect x="162" y="85"  width="7"  height="6"   fill="#FFD700" opacity="0.4"/>
    <rect x="174" y="85"  width="7"  height="6"   fill="#FFD700" opacity="0.7"/>
    <rect x="150" y="100" width="7"  height="6"   fill="#4FC3F7" opacity="0.5"/>
    <rect x="174" y="100" width="7"  height="6"   fill="#E01B24" opacity="0.6"/>

    <rect x="210" y="60"  width="45" height="140" fill="url(#buildGrad)"/>
    <rect x="215" y="65"  width="6"  height="5"   fill="#4FC3F7" opacity="0.6"/>
    <rect x="225" y="65"  width="6"  height="5"   fill="#4FC3F7" opacity="0.3"/>
    <rect x="235" y="65"  width="6"  height="5"   fill="#FFD700" opacity="0.7"/>
    <rect x="215" y="78"  width="6"  height="5"   fill="#FFD700" opacity="0.4"/>
    <rect x="235" y="78"  width="6"  height="5"   fill="#4FC3F7" opacity="0.5"/>
    <!-- Spire -->
    <rect x="230" y="42"  width="3"  height="20"  fill="#555"/>

    <rect x="260" y="100" width="30" height="100" fill="#0d0d1a"/>
    <rect x="265" y="105" width="5"  height="4"   fill="#E01B24" opacity="0.7"/>
    <rect x="275" y="105" width="5"  height="4"   fill="#FFD700" opacity="0.5"/>

    <rect x="295" y="75"  width="50" height="125" fill="url(#buildGrad)"/>
    <rect x="300" y="80"  width="7"  height="6"   fill="#FFD700" opacity="0.6"/>
    <rect x="312" y="80"  width="7"  height="6"   fill="#FFD700" opacity="0.8"/>
    <rect x="324" y="80"  width="7"  height="6"   fill="#FFD700" opacity="0.3"/>
    <rect x="300" y="94"  width="7"  height="6"   fill="#4FC3F7" opacity="0.5"/>
    <rect x="324" y="94"  width="7"  height="6"   fill="#E01B24" opacity="0.4"/>

    <rect x="350" y="50"  width="65" height="150" fill="#111"/>
    <rect x="355" y="55"  width="8"  height="7"   fill="#FFD700" opacity="0.9"/>
    <rect x="368" y="55"  width="8"  height="7"   fill="#FFD700" opacity="0.5"/>
    <rect x="381" y="55"  width="8"  height="7"   fill="#4FC3F7" opacity="0.7"/>
    <rect x="394" y="55"  width="8"  height="7"   fill="#4FC3F7" opacity="0.4"/>
    <rect x="355" y="70"  width="8"  height="7"   fill="#FFD700" opacity="0.6"/>
    <rect x="381" y="70"  width="8"  height="7"   fill="#E01B24" opacity="0.8"/>
    <!-- Antenna -->
    <rect x="380" y="30"  width="3"  height="22"  fill="#333"/>
    <circle cx="381" cy="29" r="4" fill="#E01B24" opacity="0.9"/>

    <rect x="420" y="85"  width="40" height="115" fill="url(#buildGrad)"/>
    <rect x="425" y="90"  width="6"  height="5"   fill="#4FC3F7" opacity="0.6"/>
    <rect x="436" y="90"  width="6"  height="5"   fill="#FFD700" opacity="0.7"/>
    <rect x="447" y="90"  width="6"  height="5"   fill="#4FC3F7" opacity="0.4"/>

    <rect x="465" y="65"  width="55" height="135" fill="#0a0a18"/>
    <rect x="470" y="70"  width="7"  height="6"   fill="#FFD700" opacity="0.5"/>
    <rect x="482" y="70"  width="7"  height="6"   fill="#FFD700" opacity="0.8"/>
    <rect x="494" y="70"  width="7"  height="6"   fill="#E01B24" opacity="0.6"/>
    <rect x="506" y="70"  width="7"  height="6"   fill="#4FC3F7" opacity="0.4"/>
    <rect x="470" y="84"  width="7"  height="6"   fill="#4FC3F7" opacity="0.7"/>
    <rect x="506" y="84"  width="7"  height="6"   fill="#FFD700" opacity="0.3"/>

    <rect x="525" y="95"  width="35" height="105" fill="url(#buildGrad)"/>
    <rect x="530" y="100" width="5"  height="4"   fill="#FFD700" opacity="0.6"/>
    <rect x="540" y="100" width="5"  height="4"   fill="#4FC3F7" opacity="0.5"/>
    <rect x="550" y="100" width="5"  height="4"   fill="#E01B24" opacity="0.7"/>

    <rect x="565" y="72"  width="48" height="128" fill="#111122"/>
    <rect x="570" y="77"  width="7"  height="6"   fill="#FFD700" opacity="0.7"/>
    <rect x="582" y="77"  width="7"  height="6"   fill="#FFD700" opacity="0.4"/>
    <rect x="594" y="77"  width="7"  height="6"   fill="#FFD700" opacity="0.8"/>
    <rect x="570" y="91"  width="7"  height="6"   fill="#4FC3F7" opacity="0.5"/>
    <rect x="594" y="91"  width="7"  height="6"   fill="#E01B24" opacity="0.6"/>
    <!-- Spire -->
    <rect x="587" y="52"  width="3"  height="22"  fill="#444"/>

    <rect x="618" y="88"  width="40" height="112" fill="url(#buildGrad)"/>
    <rect x="623" y="93"  width="6"  height="5"   fill="#4FC3F7" opacity="0.6"/>
    <rect x="634" y="93"  width="6"  height="5"   fill="#FFD700" opacity="0.5"/>

    <rect x="663" y="60"  width="60" height="140" fill="#0d0d1a"/>
    <rect x="668" y="65"  width="8"  height="7"   fill="#FFD700" opacity="0.8"/>
    <rect x="681" y="65"  width="8"  height="7"   fill="#FFD700" opacity="0.5"/>
    <rect x="694" y="65"  width="8"  height="7"   fill="#4FC3F7" opacity="0.7"/>
    <rect x="707" y="65"  width="8"  height="7"   fill="#4FC3F7" opacity="0.3"/>
    <rect x="668" y="80"  width="8"  height="7"   fill="#E01B24" opacity="0.6"/>
    <rect x="707" y="80"  width="8"  height="7"   fill="#FFD700" opacity="0.4"/>
    <!-- Antenna -->
    <rect x="691" y="40"  width="3"  height="22"  fill="#333"/>
    <circle cx="692" cy="39" r="3" fill="#E01B24" opacity="0.9"/>

    <rect x="728" y="90"  width="35" height="110" fill="url(#buildGrad)"/>
    <rect x="733" y="95"  width="5"  height="4"   fill="#FFD700" opacity="0.6"/>
    <rect x="748" y="95"  width="5"  height="4"   fill="#4FC3F7" opacity="0.5"/>

    <rect x="768" y="75"  width="45" height="125" fill="#111"/>
    <rect x="773" y="80"  width="7"  height="6"   fill="#FFD700" opacity="0.7"/>
    <rect x="785" y="80"  width="7"  height="6"   fill="#E01B24" opacity="0.5"/>
    <rect x="797" y="80"  width="7"  height="6"   fill="#4FC3F7" opacity="0.6"/>
  </g>

  <!-- CITY BUILDINGS - Layer 2 (duplicate, offset for seamless scroll) -->
  <g class="city2" opacity="0.7">
    <rect x="0"   y="90"  width="40" height="110" fill="url(#buildGrad)"/>
    <rect x="5"   y="95"  width="5"  height="4"   fill="#FFD700" opacity="0.6"/>
    <rect x="15"  y="95"  width="5"  height="4"   fill="#FFD700" opacity="0.3"/>
    <rect x="45"  y="70"  width="55" height="130" fill="url(#buildGrad)"/>
    <rect x="50"  y="75"  width="6"  height="5"   fill="#4FC3F7" opacity="0.5"/>
    <rect x="60"  y="75"  width="6"  height="5"   fill="#4FC3F7" opacity="0.7"/>
    <rect x="70"  y="55"  width="3"  height="18"  fill="#333"/>
    <circle cx="71" cy="54" r="3" fill="#E01B24" opacity="0.9"/>
    <rect x="145" y="80"  width="60" height="120" fill="#111122"/>
    <rect x="150" y="85"  width="7"  height="6"   fill="#FFD700" opacity="0.8"/>
    <rect x="162" y="85"  width="7"  height="6"   fill="#FFD700" opacity="0.4"/>
    <rect x="210" y="60"  width="45" height="140" fill="url(#buildGrad)"/>
    <rect x="215" y="65"  width="6"  height="5"   fill="#4FC3F7" opacity="0.6"/>
    <rect x="350" y="50"  width="65" height="150" fill="#111"/>
    <rect x="355" y="55"  width="8"  height="7"   fill="#FFD700" opacity="0.9"/>
    <rect x="368" y="55"  width="8"  height="7"   fill="#FFD700" opacity="0.5"/>
    <rect x="380" y="30"  width="3"  height="22"  fill="#333"/>
    <circle cx="381" cy="29" r="4" fill="#E01B24" opacity="0.9"/>
    <rect x="465" y="65"  width="55" height="135" fill="#0a0a18"/>
    <rect x="470" y="70"  width="7"  height="6"   fill="#FFD700" opacity="0.5"/>
    <rect x="565" y="72"  width="48" height="128" fill="#111122"/>
    <rect x="570" y="77"  width="7"  height="6"   fill="#FFD700" opacity="0.7"/>
    <rect x="663" y="60"  width="60" height="140" fill="#0d0d1a"/>
    <rect x="668" y="65"  width="8"  height="7"   fill="#FFD700" opacity="0.8"/>
    <rect x="691" y="40"  width="3"  height="22"  fill="#333"/>
    <circle cx="692" cy="39" r="3" fill="#E01B24" opacity="0.9"/>
    <rect x="768" y="75"  width="45" height="125" fill="#111"/>
    <rect x="773" y="80"  width="7"  height="6"   fill="#FFD700" opacity="0.7"/>
  </g>

  <!-- Web line from anchor point (top center) to spidey -->
  <g class="spidey">
    <!-- Web thread -->
    <line x1="400" y1="0" x2="400" y2="85"
          stroke="url(#webGrad)" stroke-width="1.5"
          stroke-dasharray="300" class="web-line"
          style="animation-delay:0s"/>

    <!-- SPIDER-MAN BODY -->
    <!-- Torso -->
    <ellipse cx="400" cy="108" rx="16" ry="20" fill="url(#bodyGrad)" class="glow"/>
    <!-- Blue shorts area -->
    <ellipse cx="400" cy="122" rx="14" ry="10" fill="#1a1aff" opacity="0.8"/>

    <!-- Head -->
    <ellipse cx="400" cy="85" rx="14" ry="15" fill="#E01B24"/>
    <!-- Web lines on mask -->
    <path d="M388 78 Q400 72 412 78" stroke="#8b0000" stroke-width="0.8" fill="none" opacity="0.8"/>
    <path d="M386 85 Q400 80 414 85" stroke="#8b0000" stroke-width="0.8" fill="none" opacity="0.8"/>
    <path d="M388 92 Q400 88 412 92" stroke="#8b0000" stroke-width="0.8" fill="none" opacity="0.8"/>
    <path d="M400 72 L400 98" stroke="#8b0000" stroke-width="0.6" fill="none" opacity="0.7"/>
    <path d="M393 73 L393 97" stroke="#8b0000" stroke-width="0.4" fill="none" opacity="0.5"/>
    <path d="M407 73 L407 97" stroke="#8b0000" stroke-width="0.4" fill="none" opacity="0.5"/>

    <!-- Eyes (white lenses) -->
    <ellipse cx="394" cy="82" rx="7" ry="5" fill="white" opacity="0.95"/>
    <ellipse cx="406" cy="82" rx="7" ry="5" fill="white" opacity="0.95"/>
    <ellipse cx="394" cy="82" rx="5" ry="3.5" fill="#ddd"/>
    <ellipse cx="406" cy="82" rx="5" ry="3.5" fill="#ddd"/>
    <!-- Eye shine -->
    <ellipse cx="392" cy="81" rx="2" ry="1.5" fill="white" opacity="0.7"/>
    <ellipse cx="404" cy="81" rx="2" ry="1.5" fill="white" opacity="0.7"/>

    <!-- Arms -->
    <!-- Left arm (reaching up to web) -->
    <path d="M385 102 Q370 90 365 78" stroke="#E01B24" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M385 102 Q370 90 365 78" stroke="#8b0000" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.4"/>
    <!-- Right arm (stretched out) -->
    <path d="M415 102 Q432 92 440 80" stroke="#E01B24" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M415 102 Q432 92 440 80" stroke="#8b0000" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.4"/>

    <!-- Hands -->
    <circle cx="365" cy="77" r="5" fill="#E01B24"/>
    <circle cx="440" cy="79" r="5" fill="#E01B24"/>

    <!-- Web shooter sparks -->
    <circle cx="362" cy="74" r="2" fill="white" opacity="0.8"/>
    <circle cx="443" cy="76" r="2" fill="white" opacity="0.8"/>

    <!-- Legs -->
    <!-- Left leg -->
    <path d="M392 128 Q375 145 368 160" stroke="#E01B24" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M368 160 Q362 170 360 175" stroke="#1a1aff" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Right leg -->
    <path d="M408 128 Q425 145 432 160" stroke="#E01B24" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M432 160 Q438 170 440 175" stroke="#1a1aff" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- Boots -->
    <ellipse cx="360" cy="177" rx="7" ry="5" fill="#1a1aff"/>
    <ellipse cx="440" cy="177" rx="7" ry="5" fill="#1a1aff"/>

    <!-- Spider logo on chest -->
    <g transform="translate(400, 110)">
      <path d="M0,-6 L1,-1 L6,0 L1,1 L0,6 L-1,1 L-6,0 L-1,-1 Z" fill="#111" opacity="0.8" transform="scale(0.8)"/>
      <path d="M0,-4 L0.8,-0.8 L4,0 L0.8,0.8 L0,4 L-0.8,0.8 L-4,0 L-0.8,-0.8 Z" fill="#000" opacity="0.6" transform="scale(0.7)"/>
    </g>

    <!-- Web strands trailing -->
    <path d="M440 80 Q460 75 480 82" stroke="white" stroke-width="0.8" fill="none" opacity="0.4" stroke-dasharray="5,3"/>
    <path d="M365 78 Q345 73 325 80" stroke="white" stroke-width="0.8" fill="none" opacity="0.4" stroke-dasharray="5,3"/>
  </g>

  <!-- Red glow at bottom -->
  <rect x="0" y="185" width="800" height="15" fill="#E01B24" opacity="0.06"/>
  <rect x="0" y="190" width="800" height="10" fill="#E01B24" opacity="0.08"/>

  <!-- Ground reflection line -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#E01B24" stroke-width="1" opacity="0.3"/>
</svg>
